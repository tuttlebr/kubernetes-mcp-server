services:
  k8s-mcp-server-read-only:
    build:
      context: src
      dockerfile: Dockerfile
    image: daedalus.ddns.me:5050/btuttle/k8s-mcp-server:latest
    environment:
      - KUBECONFIG=/home/appuser/.kube/config
      - SERVER_MODE=streamable-http
      - SERVER_PORT=8080
      - SERVER_READ_ONLY=true
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      # DevOps agent (optional — omit to disable devopsAgent tool)
      - OPENCODE_BASE_URL=${OPENCODE_BASE_URL:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-}
    volumes:
      - ./kube:/home/appuser/.kube
      - opencode-data:/home/appuser/.local/share/opencode
      - opencode-cache:/home/appuser/.cache/opencode
    ports:
      - 8080:8080
    restart: unless-stopped

volumes:
  opencode-data:
  opencode-cache:
